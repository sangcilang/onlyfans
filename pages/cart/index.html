<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Fan Shop</title>
    <link rel="stylesheet" href="/shared/css/common.css">
    <link rel="stylesheet" href="/shared/css/components.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="cart-container">
            <h2>Giỏ hàng của bạn</h2>
            
            <div id="user-info-display"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Tên quạt</th>
                        <th>Đơn giá</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="cart-table-body">
                </tbody>
            </table>

            <div class="total-price" id="total-price-display">Tổng tiền: 0đ</div>

            <div class="checkout-form">
                <h3>Thông tin thanh toán</h3>
                <input type="text" id="cusName" placeholder="Họ và tên người nhận" required>
                <input type="text" id="cusPhone" placeholder="Số điện thoại" required>
                <input type="text" id="cusAddress" placeholder="Địa chỉ giao hàng" required>
                <button onclick="handleCheckout()" class="btn">Xác nhận đặt hàng</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/shared/js/utils.js"></script>
    <script src="/shared/js/auth.js"></script>
    <script src="/shared/js/cart.js"></script>
    <script src="/shared/js/navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
