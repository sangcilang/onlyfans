<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng - Fan Shop</title>
    <link rel="stylesheet" href="../../../shared/css/common.css">
    <link rel="stylesheet" href="../../../shared/css/components.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>🎛️ Quản Trị</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="../dashboard/index.html" class="sidebar-item">
                    <span class="nav-icon">📊</span>
                    <span>Tổng Quan</span>
                </a>
                <a href="../orders/index.html" class="sidebar-item">
                    <span class="nav-icon">🛒</span>
                    <span>Đơn Hàng</span>
                </a>
                <a href="../inventory/index.html" class="sidebar-item">
                    <span class="nav-icon">📦</span>
                    <span>Quản Lý Kho</span>
                </a>
                <a href="../products/index.html" class="sidebar-item">
                    <span class="nav-icon">🏷️</span>
                    <span>Sản Phẩm</span>
                </a>
                <a href="../users/index.html" class="sidebar-item active">
                    <span class="nav-icon">👥</span>
                    <span>Người Dùng</span>
                </a>
                <a href="../posts/index.html" class="sidebar-item">
                    <span class="nav-icon">📰</span>
                    <span>Tin Tức</span>
                </a>
                <a href="../activity/index.html" class="sidebar-item">
                    <span class="nav-icon">📈</span>
                    <span>Hoạt Động</span>
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-container">
                <div class="admin-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h2 style="margin: 0;">👥 Quản Lý Người Dùng</h2>
                        <button class="btn" onclick="showAddUserForm()">➕ Thêm Người Dùng</button>
                    </div>
                    <div class="table-container">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên đăng nhập</th>
                                    <th>Email</th>
                                    <th>Ngày tạo</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="users-table">
                                <tr>
                                    <td colspan="5" class="empty-msg">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- User Form Modal -->
    <div id="user-form-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="user-form-title">Thêm Người Dùng Mới</h3>
                <button class="close-btn" onclick="hideUserForm()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="user-id">
                
                <div class="form-group">
                    <label>Tên đăng nhập <span style="color: #dc2626;">*</span></label>
                    <input type="text" id="user-username" class="form-input" placeholder="Nhập tên đăng nhập">
                    <span class="error-msg" id="error-username"></span>
                </div>
                
                <div class="form-group">
                    <label>Email <span style="color: #dc2626;">*</span></label>
                    <input type="email" id="user-email" class="form-input" placeholder="Nhập email">
                    <span class="error-msg" id="error-email"></span>
                </div>
                
                <div class="form-group">
                    <label>Mật khẩu <span style="color: #dc2626;">*</span></label>
                    <input type="password" id="user-password" class="form-input" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
                    <span class="error-msg" id="error-password"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideUserForm()">Hủy</button>
                <button class="btn" onclick="saveUser()">Lưu</button>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../../../shared/js/utils.js"></script>
    <script src="../../../shared/js/auth.js"></script>
    <script src="../../../shared/js/products.js"></script>
    <script src="../../../shared/js/sample-data.js"></script>
    <script src="../../../shared/js/cart.js"></script>
    <script src="../../../shared/js/navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
