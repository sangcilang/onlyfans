<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin Tức - Fan Shop</title>
    <link rel="stylesheet" href="../../shared/css/common.css">
    <link rel="stylesheet" href="../../shared/css/components.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <div class="blog-header">
            <h1 class="page-title">📰 Tin Tức & Truyền Thông</h1>
            <p class="page-subtitle">Cập nhật tin tức mới nhất về sản phẩm và khuyến mãi</p>
        </div>

        <div class="blog-grid" id="blog-grid">
            <!-- Blog posts will be loaded here -->
        </div>

        <div class="empty-state" id="empty-state" style="display: none;">
            <div class="empty-icon">📝</div>
            <h3>Chưa có bài viết nào</h3>
            <p>Hãy quay lại sau để xem tin tức mới nhất</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../shared/js/utils.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/cart.js"></script>
    <script src="../../shared/js/navigation.js"></script>
    <script src="script.js"></script>
</body>
</html>
