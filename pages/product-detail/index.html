<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Fan Shop</title>
    <link rel="stylesheet" href="../../shared/css/common.css">
    <link rel="stylesheet" href="../../shared/css/components.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <!-- Product Information Section -->
            <section class="product-detail-section">
                <div class="product-detail-container" id="product-detail-container">
                    <!-- Product details will be loaded here dynamically -->
                </div>
            </section>

            <!-- Review Section -->
            <section class="review-section">
                <h2 class="section-title">Đánh giá sản phẩm</h2>
                
                <!-- Review Summary -->
                <div class="review-summary" id="review-summary">
                    <!-- Review summary will be loaded here -->
                </div>

                <!-- Review Form -->
                <div class="review-form-container" id="review-form-container">
                    <!-- Review form will be loaded here -->
                </div>

                <!-- Review List -->
                <div class="review-list" id="review-list">
                    <!-- Reviews will be loaded here -->
                </div>
            </section>

            <!-- Recommendation Section -->
            <section id="recommendation-section" class="recommendation-section" style="display:none;"></section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Shared Scripts -->
    <script src="../../shared/js/utils.js"></script>
    <script src="../../shared/js/auth.js"></script>
    <script src="../../shared/js/products.js"></script>
    <script src="../../shared/js/cart.js"></script>
    <script src="../../shared/js/navigation.js"></script>
    
    <!-- Review System Scripts -->
    <script src="../../shared/js/image-service.js"></script>
    <script src="../../shared/js/reviews.js"></script>
    
    <!-- Recommendation Engine -->
    <script src="../../shared/js/recommendation-engine.js"></script>
    
    <!-- Page Script -->
    <script src="script.js"></script>
</body>
</html>
