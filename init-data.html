<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khởi Tạo Dữ Liệu Mẫu - Fan Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 12px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .info-box {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #374151;
        }

        .info-value {
            font-size: 24px;
            font-weight: 800;
            color: #10b981;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .status {
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            font-weight: 600;
            display: none;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .warning-title {
            font-weight: 700;
            color: #92400e;
            margin-bottom: 8px;
        }

        .warning-text {
            color: #78350f;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Khởi Tạo Dữ Liệu Mẫu</h1>
        <p class="subtitle">Tạo dữ liệu demo cho hệ thống Fan Shop</p>

        <div class="warning">
            <div class="warning-title">⚠️ Lưu Ý Quan Trọng</div>
            <div class="warning-text">
                Dữ liệu mẫu sẽ ghi đè lên dữ liệu hiện tại. 
                Hãy chắc chắn bạn muốn làm điều này!
            </div>
        </div>

        <div class="info-box">
            <div class="info-item">
                <span class="info-label">👥 Người dùng</span>
                <span class="info-value" id="user-count">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">📦 Sản phẩm</span>
                <span class="info-value" id="product-count">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">🛒 Đơn hàng</span>
                <span class="info-value" id="order-count">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">💰 Doanh thu</span>
                <span class="info-value" id="revenue">0đ</span>
            </div>
        </div>

        <button class="btn btn-primary" onclick="khoiTaoDuLieu()">
            ✨ Tạo Dữ Liệu Mẫu
        </button>

        <button class="btn btn-danger" onclick="xoaDuLieu()">
            🗑️ Xóa Tất Cả Dữ Liệu
        </button>

        <button class="btn btn-secondary" onclick="window.location.href='pages/home/index.html'">
            🏠 Về Trang Chủ
        </button>

        <div id="status" class="status"></div>
    </div>

    <script src="shared/js/utils.js"></script>
    <script src="shared/js/sample-data.js"></script>
    <script>
        // Load current data count
        function capNhatThongKe() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            
            document.getElementById('user-count').textContent = users.length;
            document.getElementById('product-count').textContent = products.length;
            document.getElementById('order-count').textContent = orders.length;
            
            const revenue = orders
                .filter(o => o.status !== 'Đã hủy')
                .reduce((sum, o) => sum + o.total, 0);
            
            document.getElementById('revenue').textContent = dinhDangTienTe(revenue);
        }

        function hienThiThongBao(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 5000);
        }

        function khoiTaoDuLieu() {
            if (!confirm('Bạn có chắc muốn tạo dữ liệu mẫu? Dữ liệu hiện tại sẽ bị ghi đè!')) {
                return;
            }

            const result = khoiTaoDuLieuMau();
            
            if (result) {
                hienThiThongBao(
                    `✅ Đã tạo ${result.nguoiDung} người dùng, ${result.sanPham} sản phẩm, ${result.donHang} đơn hàng!`,
                    'success'
                );
                capNhatThongKe();
            } else {
                hienThiThongBao('❌ Có lỗi xảy ra khi tạo dữ liệu', 'error');
            }
        }

        function xoaDuLieu() {
            xoaTatCaDuLieu();
        }

        // Load initial stats
        capNhatThongKe();
    </script>
</body>
</html>
