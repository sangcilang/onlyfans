<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - Fan Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container { max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .total-price { text-align: right; font-size: 1.2rem; font-weight: bold; color: red; }
        .checkout-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .checkout-form input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .empty-msg { text-align: center; color: #777; font-style: italic; }
    </style>
<header class="shopee-header">
    <div class="header-content">
        <div class="logo">ShopeeQuat</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Săn Deal Quạt Mát Chào Hè...">
            <button onclick="searchProduct()">🔍</button>
        </div>
        <div class="cart-icon">
            <a href="gio-hang.html">🛒 Giỏ hàng (<span id="cart-count">0</span>)</a>
        </div>
    </div>
    <nav class="sub-nav">
        <ul class="menu">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="gioi-thieu.html">Giới thiệu</a></li>
            <li><a href="chinh-sach.html">Chính sách</a></li>
            <li><a href="lien-he.html">Liên hệ</a></li>
        </ul>
    </nav>
</header>

    <main>
        <div class="cart-container">
            <h2>Giỏ hàng của bạn</h2>
            
            <table>
                <thead>
                    <tr>
                        <th>Tên quạt</th>
                        <th>Đơn giá</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="cart-table-body">
                    </tbody>
            </table>

            <div class="total-price" id="total-price-display">Tổng tiền: 0đ</div>

            <div class="checkout-form">
                <h3>Thông tin thanh toán</h3>
                <input type="text" id="cusName" placeholder="Họ và tên người nhận" required>
                <input type="text" id="cusPhone" placeholder="Số điện thoại" required>
                <input type="text" id="cusAddress" placeholder="Địa chỉ giao hàng" required>
                <button onclick="processCheckout()" style="background: #28a745; font-size: 1.1rem; padding: 12px;">Xác nhận đặt hàng</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Website Bán Quạt - Nhóm của bạn</p>
    </footer>

    <script>
        // Đọc dữ liệu giỏ hàng từ localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const tableBody = document.getElementById('cart-table-body');
        const totalDisplay = document.getElementById('total-price-display');

        function renderCart() {
            tableBody.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="empty-msg">Giỏ hàng đang trống. Hãy quay lại trang chủ chọn quạt nhé!</td></tr>';
                totalDisplay.innerText = "Tổng tiền: 0đ";
                return;
            }

            cart.forEach((item, index) => {
                total += item.price;
                let row = `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.price.toLocaleString('vi-VN')}đ</td>
                        <td><button onclick="removeItem(${index})" style="background: #dc3545; padding: 5px 10px;">Xóa</button></td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            totalDisplay.innerText = `Tổng tiền: ${total.toLocaleString('vi-VN')}đ`;
        }

        // Chức năng xóa sản phẩm khỏi giỏ
        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        // Chức năng Thanh toán
        function processCheckout() {
            const name = document.getElementById('cusName').value;
            const phone = document.getElementById('cusPhone').value;
            const address = document.getElementById('cusAddress').value;

            if (cart.length === 0) {
                alert('Giỏ hàng trống, không thể thanh toán!');
                return;
            }

            if (!name || !phone || !address) {
                alert('Vui lòng điền đầy đủ thông tin nhận hàng!');
                return;
            }

            // Giả lập thanh toán thành công
            alert(`Cảm ơn bạn ${name}!\nĐơn hàng đã được ghi nhận. Chúng tôi sẽ giao quạt đến địa chỉ: ${address} sớm nhất!`);
            
            // Xóa sạch giỏ hàng sau khi mua xong
            localStorage.removeItem('cart');
            window.location.href = "index.html"; 
        }

        // Chạy hàm hiển thị khi mở trang
        renderCart();
    </script>
</body>
</html>
